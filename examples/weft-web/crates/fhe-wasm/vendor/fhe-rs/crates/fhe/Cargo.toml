[package]
name = "fhe"
description = "Fully Homomorphic Encryption in Rust"
authors = ["Tancrède Lepoint", "Vele Tosevski", "Nathan Ginnever"]
documentation = "https://fhe.rs"
edition = "2021"
license-file = "../../LICENSE"
repository = "https://github.com/tlepoint/fhe.rs"
version = "0.1.0-beta.7"
rust-version = "1.73"

[lib]
bench = false # Disable default bench (we use criterion)

[dependencies]
fhe-math = { version = "^0.1.0-beta.7", path = "../fhe-math" }
fhe-traits = { version = "^0.1.0-beta.7", path = "../fhe-traits" }
fhe-util = { version = "^0.1.0-beta.7", path = "../fhe-util" }
serde = { version = "1.0.197", features = ["derive"] }
bincode = "1.3"
num-bigint = { version = "0.4.4", features = ["rand"] }

doc-comment = "0.3.3"
itertools = "0.12.0"
num-traits = "0.2.17"
prost = "0.12.3"
rand = "0.8.5"
rand_chacha = "0.3.1"
rand_distr = "0.4.0"
zeroize = "1.7.0"
zeroize_derive = "1.4.2"
ndarray = "0.15.6"
thiserror = "1.0.50"

[build-dependencies]
prost-build = "0.12.3"

[dev-dependencies]
criterion = "0.5.1"
indicatif = "0.17.7"
itertools = "0.12.0"
ndarray = "0.15.6"
rand = "0.8.5"
console = "0.15.7"

[[bench]]
name = "bfv"
harness = false

[[bench]]
name = "bfv_optimized_ops"
harness = false

[[bench]]
name = "bfv_rgsw"
harness = false

[[bench]]
name = "trbfv_bfv_share"
harness = false

[[example]]
name = "mulpir"

[[example]]
name = "sealpir"

[[example]]
name = "util"

[[example]]
name = "voting"
