[package]
name = "fhe-math"
description = "Mathematical utilities for the fhe.rs library"
authors = ["Tancrède Lepoint", "Vele Tosevski", "Nathan Ginnever"]
documentation = "https://fhe.rs"
edition = "2021"
license-file = "../../LICENSE"
repository = "https://github.com/tlepoint/fhe.rs"
version = "0.1.0-beta.7"
rust-version = "1.73"

[lib]
bench = false  # Disable default bench (we use criterion)

[dependencies]
fhe-traits = { version = "^0.1.0-beta.7", path = "../fhe-traits" }
fhe-util = { version = "^0.1.0-beta.7", path = "../fhe-util" }

ethnum = "1.5.0"
itertools = "0.12.0"
ndarray = "0.15.6"
num-bigint = "0.4.4"
num-bigint-dig = "0.8.4"
num-traits = "0.2.17"
prost = "0.12.3"
rand = "0.8.5"
rand_chacha = "0.3.1"
thiserror = "1.0.50"
zeroize = "1.7.0"
sha2 = "0.10.8"
serde = { version = "1.0.197", features = ["derive"] }

[build-dependencies]
prost-build = "0.12.3"

[dev-dependencies]
criterion = "0.5.1"
proptest = "1.4.0"

[[bench]]
name = "zq"
harness = false

[[bench]]
name = "rq"
harness = false

[[bench]]
name = "ntt"
harness = false

[[bench]]
name = "rns"
harness = false
