[package]
name = "fhe-util"
description = "Utilities for the fhe.rs library"
authors = ["Tancrède Lepoint", "Vele Tosevski", "Nathan Ginnever"]
documentation = "https://fhe.rs"
edition = "2021"
license-file = "../../LICENSE"
repository = "https://github.com/tlepoint/fhe.rs"
version = "0.1.0-beta.7"
rust-version = "1.73"

[dependencies]
itertools = "0.12.0"
num-bigint-dig = { version = "0.8.4", features = ["prime"] }
num-traits = "0.2.17"
prime_factorization = "1.0.5"
rand = "0.8.5"
rand_distr = "0.4.0"

[dev-dependencies]
proptest = "1.4.0"
